<style>
.sfhm{--bg:#0A0A0A;--card-bg:#121212;--border-gray:#1E1E1E;--text:#ffffff;--text-muted:#A3A3A3;--nm-gold:#FFB800;--nm-crimson:#D6221D;--nm-turquoise:#00A896;
  background:var(--bg);color:var(--text);line-height:1.55;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
.sfhm *{box-sizing:border-box;}
.sfhm img{max-width:100%;display:block;}
.sfhm a{color:var(--nm-gold);}
.sfhm .container{max-width:1100px;margin:0 auto;padding:0 20px;}
.sfhm .eyebrow{color:var(--nm-gold);font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-size:.75rem;margin:0 0 8px;}
.sfhm h1,.sfhm h2,.sfhm h3{color:var(--text);}
.sfhm h2{font-size:2rem;font-weight:900;margin:0 0 8px;}
.sfhm .section{padding:64px 0;}
.sfhm .section-sub{color:var(--text-muted);max-width:640px;margin:0 0 28px;}
.sfhm .card{background:var(--card-bg);border:1px solid var(--border-gray);border-radius:16px;overflow:hidden;}
.sfhm .btn{display:inline-block;background:var(--nm-gold);color:#0A0A0A;font-weight:800;text-decoration:none;border-radius:10px;padding:10px 20px;font-size:.95rem;border:0;cursor:pointer;}
.sfhm .btn:hover,.sfhm .btn:focus{filter:brightness(1.08);}
.sfhm .btn-ghost{background:transparent;color:var(--text);border:1px solid var(--text-muted);}
.sfhm .btn-ghost:hover,.sfhm .btn-ghost:focus{border-color:var(--text);}
.sfhm :focus-visible{outline:2px solid var(--nm-gold);outline-offset:2px;}
.sfhm .register-band{background:linear-gradient(120deg,#171204 0%,#121212 60%);border-top:1px solid var(--border-gray);border-bottom:1px solid var(--border-gray);}
.sfhm .register-band .container{display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;padding-top:44px;padding-bottom:44px;}
.sfhm .register-band h2{margin:0 0 4px;}
.sfhm .register-band p{margin:0;color:var(--text-muted);}
</style>
<div class="sfhm">
<section class="register-band">
  <div class="container">
    <div>
      <p class="eyebrow">September 20, 2026</p>
      <h2>Toe the line in Eldorado.</h2>
      <p>Registration is open now on RunSignup.</p>
    </div>
    <a class="btn" href="https://runsignup.com/Race/NM/SantaFe/SantaFeInternationalHalfMarathon">Register now</a>
  </div>
</section>
</div>
