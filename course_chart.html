<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Course Elevation — Santa Fe Half Marathon</title>
<style>
  :root {
    --bg:#0A0A0A; --card:#121212; --ink:#ffffff; --muted:#A3A3A3;
    --gold:#FFB800; --crimson:#D6221D; --turquoise:#00A896; --line:#1E1E1E;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);
       font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
  .wrap{max-width:760px;margin:0 auto;padding:20px 16px 24px;}
  .eyebrow{color:var(--gold);font-weight:700;letter-spacing:.08em;
           text-transform:uppercase;font-size:.72rem;margin:0 0 6px;}
  h1{font-size:1.4rem;font-weight:900;margin:0 0 4px;}
  .sub{color:var(--muted);font-size:.85rem;margin:0 0 16px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
        padding:16px 14px 8px;}
  .stats{display:flex;flex-wrap:wrap;gap:10px;margin:14px 0 0;}
  .chip{background:var(--card);border:1px solid var(--line);border-radius:10px;
        padding:8px 12px;min-width:96px;}
  .chip b{display:block;font-size:1.05rem;color:var(--gold);
          font-variant-numeric:tabular-nums;}
  .chip span{font-size:.72rem;color:var(--muted);text-transform:uppercase;
             letter-spacing:.04em;}
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">The course</p>
  <h1>Elevation Profile</h1>
  <p class="sub">Point-to-point, net-downhill. La Tienda at Eldorado to Railyard Park.</p>

  <div class="card">
    <svg id="chart" viewBox="0 0 700 260" width="100%" role="img"
         aria-label="Elevation profile from 6,992 ft at the start, up to 7,330 ft near mile 4, down to 6,956 ft at the finish."></svg>
  </div>

  <div class="stats">
    <div class="chip"><b>13.109</b><span>USATF miles</span></div>
    <div class="chip"><b>7,330'</b><span>High · mile 4</span></div>
    <div class="chip"><b>6,956'</b><span>Finish</span></div>
    <div class="chip"><b>net −36'</b><span>Downhill</span></div>
  </div>
</div>

<script>
// Per-mile elevations (official published anchors, interpolated between).
const ELEV = [6992,7080,7180,7280,7330,7250,7160,7090,7040,7010,6995,6980,6968,6956];
const svg = document.getElementById("chart");
const W=700, H=260, padL=44, padR=14, padT=14, padB=28;
const minE=6900, maxE=7380;
const x = i => padL + (i/(ELEV.length-1))*(W-padL-padR);
const y = e => padT + (1-(e-minE)/(maxE-minE))*(H-padT-padB);

function el(tag, attrs){ const n=document.createElementNS("http://www.w3.org/2000/svg",tag);
  for(const k in attrs) n.setAttribute(k,attrs[k]); return n; }

// horizontal gridlines + labels every 100 ft
for(let e=6900;e<=7300;e+=100){
  svg.appendChild(el("line",{x1:padL,y1:y(e),x2:W-padR,y2:y(e),stroke:"#1E1E1E","stroke-width":1}));
  const t=el("text",{x:padL-6,y:y(e)+3,fill:"#A3A3A3","font-size":10,"text-anchor":"end"});
  t.textContent=e.toLocaleString(); svg.appendChild(t);
}
// area fill
let d="M "+x(0)+" "+y(ELEV[0]);
ELEV.forEach((e,i)=>{ if(i) d+=" L "+x(i)+" "+y(e); });
const area=d+" L "+x(ELEV.length-1)+" "+(H-padB)+" L "+x(0)+" "+(H-padB)+" Z";
svg.appendChild(el("path",{d:area,fill:"#FFB800","fill-opacity":0.12}));
svg.appendChild(el("path",{d:d,fill:"none",stroke:"#FFB800","stroke-width":2.5,"stroke-linejoin":"round"}));

// markers: start, peak (index 4), finish
function marker(i,label,color){
  svg.appendChild(el("circle",{cx:x(i),cy:y(ELEV[i]),r:4,fill:color,stroke:"#0A0A0A","stroke-width":2}));
  const t=el("text",{x:x(i),y:y(ELEV[i])-9,fill:"#fff","font-size":10,"font-weight":700,
    "text-anchor": i===0?"start":(i===ELEV.length-1?"end":"middle")});
  t.textContent=label; svg.appendChild(t);
}
marker(0,"Start · 6,992'","#00A896");
marker(4,"Peak · 7,330'","#FFB800");
marker(ELEV.length-1,"Finish · 6,956'","#D6221D");

// x-axis mile labels
[0,4,8,13].forEach(m=>{ const i=Math.min(m,ELEV.length-1);
  const t=el("text",{x:x(i),y:H-8,fill:"#A3A3A3","font-size":10,
    "text-anchor": m===0?"start":(m===13?"end":"middle")});
  t.textContent="Mi "+m; svg.appendChild(t); });
</script>
</body>
</html>
