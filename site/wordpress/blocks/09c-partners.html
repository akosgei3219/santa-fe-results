<style>
.sfhm{--bg:#0A0A0A;--card-bg:#121212;--border-gray:#1E1E1E;--text:#ffffff;--text-muted:#A3A3A3;--nm-gold:#FFB800;--nm-crimson:#D6221D;--nm-turquoise:#00A896;
  background:var(--bg);color:var(--text);line-height:1.55;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
.sfhm *{box-sizing:border-box;}
.sfhm img{max-width:100%;display:block;}
.sfhm a{color:var(--nm-gold);}
.sfhm .container{max-width:1100px;margin:0 auto;padding:0 20px;}
.sfhm .eyebrow{color:var(--nm-gold);font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-size:.75rem;margin:0 0 8px;}
.sfhm h1,.sfhm h2,.sfhm h3{color:var(--text);}
.sfhm h2{font-size:2rem;font-weight:900;margin:0 0 8px;}
.sfhm .section{padding:64px 0;}
.sfhm .section-sub{color:var(--text-muted);max-width:640px;margin:0 0 28px;}
.sfhm .card{background:var(--card-bg);border:1px solid var(--border-gray);border-radius:16px;overflow:hidden;}
.sfhm .btn{display:inline-block;background:var(--nm-gold);color:#0A0A0A;font-weight:800;text-decoration:none;border-radius:10px;padding:10px 20px;font-size:.95rem;border:0;cursor:pointer;}
.sfhm .btn:hover,.sfhm .btn:focus{filter:brightness(1.08);}
.sfhm .btn-ghost{background:transparent;color:var(--text);border:1px solid var(--text-muted);}
.sfhm .btn-ghost:hover,.sfhm .btn-ghost:focus{border-color:var(--text);}
.sfhm :focus-visible{outline:2px solid var(--nm-gold);outline-offset:2px;}
.sfhm [id]{scroll-margin-top:84px;}
.sfhm .partners-strip{border-top:1px solid var(--border-gray);background:var(--card-bg);}
.sfhm .partners-strip .container{display:flex;align-items:center;justify-content:center;gap:48px;flex-wrap:wrap;padding-top:36px;padding-bottom:36px;}
.sfhm .partner{display:flex;align-items:center;gap:14px;}
.sfhm .partner img{max-height:44px;width:auto;background:#fff;border-radius:8px;padding:4px 8px;}
.sfhm .partner .partner-label{color:var(--text-muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;display:block;}
.sfhm .partner .partner-name{color:var(--text);font-weight:800;font-size:1.05rem;}
</style>
<div class="sfhm">
<div class="partners-strip" aria-label="Race partners">
  <div class="container">
    <div class="partner">
      <!-- Sponsor logos served from the static-site CDN; swap for Media
           Library URLs any time. -->
      <img src="https://santa-fe-results-board.onrender.com/assets/capitol-ford.png" alt="Capitol Ford" onerror="this.style.display='none'">
      <span><span class="partner-label">Title sponsor</span><span class="partner-name">Capitol Ford</span></span>
    </div>
    <div class="partner">
      <img src="https://santa-fe-results-board.onrender.com/assets/pecos-trail-inn.png" alt="Pecos Trail Inn" onerror="this.style.display='none'">
      <span><span class="partner-label">Lodging partner</span><span class="partner-name">Pecos Trail Inn</span></span>
    </div>
  </div>
</div>
</div>
