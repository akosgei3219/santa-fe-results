# Render.com blueprint — push-button deploy.
# In Render: New > Blueprint > connect the repo containing this file.
services:
  - type: web
    name: santa-fe-half-marathon
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /leaderboard
    autoDeploy: true
    envVars:
      - key: MCP_HOST
        value: 0.0.0.0
      - key: MCP_PORT
        value: "8000"
      - key: REGISTRATION_BACKEND
        value: json

  # Standalone homepage (site/index.html) as a static site. Plain HTML -
  # nothing to build; publish the folder as-is. If you created this service
  # by hand, make sure its Build Command is EMPTY (a leftover `npm run
  # build` fails with status 254 because this repo has no package.json).
  - type: web
    name: santa-fe-results-board
    runtime: static
    buildCommand: ""
    staticPublishPath: ./site
    autoDeploy: true
