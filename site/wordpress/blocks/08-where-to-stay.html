<style>
.sfhm{--bg:#0A0A0A;--card-bg:#121212;--border-gray:#1E1E1E;--text:#ffffff;--text-muted:#A3A3A3;--nm-gold:#FFB800;--nm-crimson:#D6221D;--nm-turquoise:#00A896;
  background:var(--bg);color:var(--text);line-height:1.55;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;}
.sfhm *{box-sizing:border-box;}
.sfhm img{max-width:100%;display:block;}
.sfhm a{color:var(--nm-gold);}
.sfhm .container{max-width:1100px;margin:0 auto;padding:0 20px;}
.sfhm .eyebrow{color:var(--nm-gold);font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-size:.75rem;margin:0 0 8px;}
.sfhm h1,.sfhm h2,.sfhm h3{color:var(--text);}
.sfhm h2{font-size:2rem;font-weight:900;margin:0 0 8px;}
.sfhm .section{padding:64px 0;}
.sfhm .section-sub{color:var(--text-muted);max-width:640px;margin:0 0 28px;}
.sfhm .card{background:var(--card-bg);border:1px solid var(--border-gray);border-radius:16px;overflow:hidden;}
.sfhm .btn{display:inline-block;background:var(--nm-gold);color:#0A0A0A;font-weight:800;text-decoration:none;border-radius:10px;padding:10px 20px;font-size:.95rem;border:0;cursor:pointer;}
.sfhm .btn:hover,.sfhm .btn:focus{filter:brightness(1.08);}
.sfhm .btn-ghost{background:transparent;color:var(--text);border:1px solid var(--text-muted);}
.sfhm .btn-ghost:hover,.sfhm .btn-ghost:focus{border-color:var(--text);}
.sfhm :focus-visible{outline:2px solid var(--nm-gold);outline-offset:2px;}
.sfhm .stay-card{display:flex;flex-wrap:wrap;align-items:center;}
.sfhm .stay-logo{flex:1 1 260px;background:#ffffff;align-self:stretch;display:flex;align-items:center;justify-content:center;padding:28px;}
.sfhm .stay-logo img{max-height:180px;width:auto;}
.sfhm .stay-body{flex:2 1 320px;padding:28px;}
.sfhm .promo-code-box{margin:0;}
.sfhm .promo-code-box code{display:inline-block;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-weight:900;font-size:1.15rem;letter-spacing:.06em;color:var(--nm-gold);border:1px dashed var(--nm-gold);border-radius:10px;padding:10px 18px;background:rgba(255,184,0,.06);}
</style>
<div class="sfhm">
<section id="stay" class="section">
  <div class="container">
    <p class="eyebrow">Race weekend</p>
    <h2>Where to Stay</h2>
    <p class="section-sub">Our lodging partner is holding a race-week deal for Santa Fe Half Marathon runners.</p>
    <div class="card stay-card">
      <div class="stay-logo" id="stay-logo">
        <!-- Replace LOGO_URL_PECOS with the Media Library URL of the Pecos Trail Inn
             logo. Until then this white panel hides itself. -->
        <img src="LOGO_URL_PECOS" alt="Pecos Trail Inn"
             onerror="document.getElementById('stay-logo').style.display='none'">
      </div>
      <div class="stay-body">
        <h3 style="margin:0 0 6px;font-size:1.3rem;">Pecos Trail Inn</h3>
        <p style="color:var(--text-muted);margin:0 0 14px;">
          Santa Fe Half Marathon runners save <strong style="color:var(--text)">15%</strong> on
          race-week stays — <strong style="color:var(--text)">Wednesday, Sept 16 through
          Tuesday, Sept 22</strong>. Mention the promo code when you book:
        </p>
        <p class="promo-code-box"><code>RUNSANTAFE26</code></p>
      </div>
    </div>
  </div>
</section>
</div>
<script>
// Hides itself once the offer window closes (end of day Tue, Sept 22, 2026, Mountain time).
if (new Date() > new Date("2026-09-22T23:59:59-06:00")) {
  document.getElementById("stay").style.display = "none";
}
</script>
