<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Santa Fe Half Marathon — Live Leaderboard</title>
<style>
  :root {
    /* Matched to santafehalfmarathon.com brand palette */
    --bg: #0A0A0A; --card: #121212; --ink: #ffffff; --muted: #A3A3A3;
    --accent: #FFB800; --crimson: #D6221D; --turquoise: #00A896;
    --line: #1E1E1E; --row: #161616;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
         background: var(--bg); color: var(--ink); }
  .wrap { max-width: 680px; margin: 0 auto; padding: 20px 16px 28px; }
  header { display: flex; align-items: baseline; justify-content: space-between;
           gap: 12px; margin-bottom: 6px; flex-wrap: wrap; }
  h1 { font-size: 18px; margin: 0; letter-spacing: .2px; }
  .sub { color: var(--muted); font-size: 12px; }
  .controls { display: flex; gap: 8px; align-items: center; margin: 12px 0 14px; }
  select, button { background: var(--card); color: var(--ink); border: 1px solid var(--line);
           border-radius: 8px; padding: 6px 10px; font-size: 13px; }
  button { cursor: pointer; }
  table { width: 100%; border-collapse: collapse; background: var(--card);
          border-radius: 12px; overflow: hidden; }
  th, td { text-align: left; padding: 10px 12px; font-size: 14px; }
  thead th { background: #122135; color: var(--muted);
             font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
  tbody tr { border-top: 1px solid var(--line); }
  tbody tr:nth-child(odd) { background: var(--row); }
  .place { width: 42px; font-weight: 700; color: var(--accent); }
  .time { font-variant-numeric: tabular-nums; text-align: right; }
  .pace { color: var(--muted); text-align: right; font-variant-numeric: tabular-nums; }
  .name { font-weight: 600; }
  .meta { color: var(--muted); font-size: 12px; }
  .status { color: var(--muted); font-size: 13px; padding: 18px 6px; text-align: center; }
  .foot { display: flex; justify-content: space-between; align-items: center;
          margin-top: 10px; color: var(--muted); font-size: 12px; }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%;
         background:#3ecf6a; margin-right:6px; vertical-align:middle; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🏃 Santa Fe Half Marathon — Live Leaderboard</h1>
  </header>
  <div class="sub">Top finishers, updating automatically on race day.</div>

  <div class="controls">
    <label class="meta">Year
      <select id="year">
        <option value="2026">2026</option>
        <option value="2025" selected>2025</option>
        <option value="2023">2023</option>
      </select>
    </label>
    <label class="meta">Show
      <select id="topn">
        <option>5</option><option selected>10</option><option>25</option>
      </select>
    </label>
    <button id="refresh">Refresh</button>
  </div>

  <div class="controls" style="margin-top:0">
    <input id="bib" type="number" inputmode="numeric" placeholder="Your bib #"
           style="width:120px" aria-label="Bib number" />
    <button id="findbtn">Find my time</button>
    <span id="findout" class="meta"></span>
  </div>

  <table>
    <thead>
      <tr><th class="place">#</th><th>Runner</th><th class="time">Time</th><th class="pace">Pace</th></tr>
    </thead>
    <tbody id="rows"><tr><td colspan="4" class="status">Loading…</td></tr></tbody>
  </table>

  <div class="foot">
    <span><span class="dot"></span><span id="live">auto-refresh 30s</span></span>
    <span id="stamp"></span>
  </div>
</div>

<script>
// The widget reads from the server's JSON route on the SAME origin it is served
// from, so embedding it just works. Override by setting window.LEADERBOARD_URL.
const BASE = (window.LEADERBOARD_URL || "/leaderboard.json");

function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g, c =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

async function load() {
  const year = document.getElementById("year").value;
  const topn = document.getElementById("topn").value;
  const tbody = document.getElementById("rows");
  try {
    const r = await fetch(`${BASE}?year=${year}&top_n=${topn}`, {cache:"no-store"});
    const data = await r.json();
    if (data.status !== "ok") {
      tbody.innerHTML = `<tr><td colspan="4" class="status">No results yet for ${esc(year)}. ${esc(data.reason||"")}</td></tr>`;
    } else if (!data.leaderboard.length) {
      tbody.innerHTML = `<tr><td colspan="4" class="status">Results haven't posted yet — check back on race day.</td></tr>`;
    } else {
      tbody.innerHTML = data.leaderboard.map(row => `
        <tr>
          <td class="place">${esc(row.place)}</td>
          <td><span class="name">${esc(row.name)}</span>
              <div class="meta">bib #${esc(row.bib)} · ${esc(row.gender||"")}${row.age?" · "+esc(row.age):""}</div></td>
          <td class="time">${esc(row.finish_time||"—")}</td>
          <td class="pace">${esc(row.pace_per_mile||"")}${row.pace_per_mile?"/mi":""}</td>
        </tr>`).join("");
    }
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="4" class="status">Couldn't reach the results feed.</td></tr>`;
  }
  document.getElementById("stamp").textContent = "updated " + new Date().toLocaleTimeString();
}

document.getElementById("refresh").addEventListener("click", load);
document.getElementById("year").addEventListener("change", load);
document.getElementById("topn").addEventListener("change", load);
load();
const RESULT_URL = (window.RESULT_URL || "/result.json");
async function findMe() {
  const bib = document.getElementById("bib").value.trim();
  const year = document.getElementById("year").value;
  const out = document.getElementById("findout");
  if (!bib) { out.textContent = "Enter a bib number."; return; }
  out.textContent = "Looking…";
  try {
    const r = await fetch(`${RESULT_URL}?bib=${encodeURIComponent(bib)}&year=${year}`, {cache:"no-store"});
    const d = await r.json();
    if (d.status === "found") {
      out.textContent = `${d.name}: ${d.finish_time} · place ${d.place} · ${d.pace_per_mile}/mi`;
    } else if (d.status === "not_found") {
      out.textContent = `No ${year} result for bib #${esc(bib)}.`;
    } else {
      out.textContent = "Results not available yet.";
    }
  } catch (e) { out.textContent = "Couldn't reach the results feed."; }
}
document.getElementById("findbtn").addEventListener("click", findMe);
document.getElementById("bib").addEventListener("keydown", e => { if (e.key === "Enter") findMe(); });

setInterval(load, 30000);  // live refresh
</script>
</body>
</html>
